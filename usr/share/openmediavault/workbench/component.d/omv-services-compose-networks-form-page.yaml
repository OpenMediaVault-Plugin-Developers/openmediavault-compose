version: "1.0"
type: component
data:
  name: omv-services-compose-network-form-page
  type: formPage
  config:
    request:
      service: Compose
      post:
        method: setNetwork
    fields:
      - type: confObjUuid
      - type: textInput
        name: name
        label: _("Name")
        value: ""
        validators:
          required: true
      - type: select
        name: driver
        label: _("Driver")
        value: "bridge"
        store:
          data:
            - ["bridge", "bridge"]
            - ["ipvlan", "ipvlan"]
            - ["macvlan", "macvlan"]
            - ["overlay", "overlay"]
      - type: textInput
        name: parentnetwork
        label: _("Parent network")
        value: ""
        suggestions: true
        hint: _("Host interface this network is attached to. Use a VLAN sub-interface for 802.1Q tagging, e.g. eth0.10")
        store:
          proxy:
            service: Compose
            get:
              method: enumerateNetworkList
        modifiers:
          - type: visible
            constraint:
              operator: in
              arg0:
                prop: driver
              arg1: ["macvlan", "ipvlan"]
      - type: select
        name: macvlanmode
        label: _("Mode")
        value: "bridge"
        store:
          data:
            - ["bridge", "bridge"]
            - ["private", "private"]
            - ["vepa", "vepa"]
            - ["passthru", "passthru"]
        modifiers:
          - type: visible
            constraint:
              operator: eq
              arg0:
                prop: driver
              arg1: "macvlan"
      - type: select
        name: ipvlanmode
        label: _("Mode")
        value: "l2"
        store:
          data:
            - ["l2", "l2"]
            - ["l3", "l3"]
        modifiers:
          - type: visible
            constraint:
              operator: eq
              arg0:
                prop: driver
              arg1: "ipvlan"
      - type: checkbox
        name: internal
        label: _("Internal network")
        value: false
        hint: _("Restrict external access. Containers can talk to each other, but the network is not reachable from outside the host.")
        modifiers:
          - type: visible
            constraint:
              operator: in
              arg0:
                prop: driver
              arg1: ["bridge","overlay"]
      - type: container
        fields:
          - type: textInput
            name: subnet
            label: _("Subnet")
            value: ""
            hint: _("e.g. 172.20.0.0/16")
          - type: textInput
            name: gateway
            label: _("Gateway")
            value: ""
            hint: _("e.g. 172.20.0.1")
            validators:
              patternType: ipv4
          - type: textInput
            name: iprange
            label: _("IP range")
            value: ""
            hint: _("e.g. 172.20.10.128/25")
      - type: checkbox
        name: ipv6
        label: _("Enable IPv6")
        value: false
        hint: _("Assign an IPv6 subnet to this network (dual-stack). Requires IPv6 to be enabled in the Docker daemon.")
      - type: container
        fields:
          - type: textInput
            name: subnet6
            label: _("IPv6 subnet")
            value: ""
            hint: _("e.g. 2001:db8:abcd::/64 or fd00::/64")
          - type: textInput
            name: gateway6
            label: _("IPv6 gateway")
            value: ""
            hint: _("e.g. 2001:db8:abcd::1")
        modifiers:
          - type: visible
            constraint:
              operator: truthy
              arg0:
                prop: ipv6
      - type: textInput
        name: auxaddress
        label: _("Aux address")
        value: ""
        hint: _("Format is name=ip. Comma separate multiple entries.<br/>e.g. my-router=192.168.10.5,my-nas=192.168.20.6")
    buttons:
      - template: submit
        execute:
          type: url
          url: "/services/compose/networks"
      - template: cancel
        execute:
          type: url
          url: "/services/compose/networks"
