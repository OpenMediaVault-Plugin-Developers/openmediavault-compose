version: "1.0"
type: component
data:
  name: omv-services-compose-networks-datatable-page
  type: datatablePage
  config:
    autoReload: false
    hasSearchField: true
    remoteSorting: true
    rowId: name
    stateId: d32e223c-0591-11ee-9d61-9bfb68b33e85
    sorters:
      - dir: asc
        prop: name
    store:
      proxy:
        service: Compose
        get:
          method: getNetworksBg
          task: true
    columns:
      - name: _("Name")
        prop: name
        flexGrow: 1
        sortable: true
      - name: _("Driver")
        prop: driver
        flexGrow: 1
        sortable: true
      - name: _("Parent")
        prop: parent
        flexGrow: 1
        sortable: true
      - name: _("Mode")
        prop: mode
        flexGrow: 1
        sortable: true
      - name: _("Subnet")
        prop: subnet
        flexGrow: 1
        sortable: true
      - name: _("Gateway")
        prop: gateway
        flexGrow: 1
        sortable: true
      - name: _("Containers")
        prop: containers
        flexGrow: 2
        cellTemplateName: template
        cellTemplateConfig: "{% for c in containers %}• {{ c }}{% if not loop.last %}<br>{% endif %}{% endfor %}"
    actions:
      - template: create
        execute:
          type: url
          url: "/services/compose/networks/create"
      - type: iconButton
        icon: "delete"
        tooltip: _("Delete")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: taskDialog
          taskDialog:
            config:
              title: _("docker network rm ...")
              startOnInit: true
              request:
                service: Compose
                method: doDockerNetworkCmd
                params:
                  name: "{{ _selected[0].name }}"
                  command: "rm"
      - type: iconButton
        icon: mdi:magnify
        tooltip: _("Inspect")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: taskDialog
          taskDialog:
            config:
              title: _("docker network inspect ...")
              startOnInit: true
              request:
                service: Compose
                method: doDockerNetworkCmd
                params:
                  name: "{{ _selected[0].name }}"
                  command: "inspect"
              buttons:
                stop:
                  hidden: true
      - type: iconButton
        icon: mdi:lan-connect
        tooltip: _("Connect container")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: formDialog
          formDialog:
            title: _("docker network connect ...")
            fields:
              - type: hidden
                name: name
                value: "{{ _selected[0].name }}"
              - type: hidden
                name: command
                value: "connect"
              - type: textInput
                name: networkdisplay
                label: _("Network")
                value: "{{ _selected[0].name }}"
                readonly: true
              - type: select
                name: container
                label: _("Container")
                textField: desc
                valueField: name
                store:
                  proxy:
                    service: Compose
                    get:
                      method: enumerateContainers
                validators:
                  required: true
              - type: textInput
                name: ipaddress
                label: _("IP address")
                value: ""
                hint: _("Optional. Assign a static IP from the network subnet, e.g. 172.20.0.10")
            buttons:
              submit:
                text: _("Connect")
                execute:
                  type: request
                  request:
                    service: Compose
                    method: doNetworkConnect
                    successUrl: "/services/compose/networks"
      - type: iconButton
        icon: mdi:lan-disconnect
        tooltip: _("Disconnect container")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: formDialog
          formDialog:
            title: _("docker network disconnect ...")
            fields:
              - type: hidden
                name: name
                value: "{{ _selected[0].name }}"
              - type: hidden
                name: command
                value: "disconnect"
              - type: textInput
                name: networkdisplay
                label: _("Network")
                value: "{{ _selected[0].name }}"
                readonly: true
              - type: select
                name: container
                label: _("Container")
                textField: desc
                valueField: name
                store:
                  proxy:
                    service: Compose
                    get:
                      method: enumerateContainers
                validators:
                  required: true
            buttons:
              submit:
                text: _("Disconnect")
                execute:
                  type: request
                  request:
                    service: Compose
                    method: doNetworkConnect
                    successUrl: "/services/compose/networks"
